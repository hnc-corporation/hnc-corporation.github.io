<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SafeGuard">
<title>SafeGuard — 스마트 중대재해 예방 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
/* ── 리셋 & 변수 ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--surface:#111827;--card:#1a2235;--border:#1e3a5f;--border2:#243d5e;
  --accent:#00d4ff;--accent2:#ff6b35;
  --success:#00e676;--warn:#ffab00;--danger:#ff1744;--info:#448aff;
  --text:#e8f4fd;--muted:#6b8cae;--muted2:#2a4a6a;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
  --font:'Noto Sans KR',-apple-system,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── 레이아웃 ── */
#app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:172px;background:var(--surface);border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column}
.content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}

/* ── 사이드바 ── */
.nav-section{font-size:9px;color:var(--muted2);padding:10px 14px 3px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:var(--muted);font-size:13px;border:none;background:transparent;width:100%;text-align:left;border-right:2px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text)}
.nav-item.active{background:rgba(0,212,255,.08);color:var(--accent);border-right-color:var(--accent)}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-footer{margin-top:auto;padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--muted2)}

/* ── 카드 ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title i{font-size:15px;color:var(--accent)}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex-shrink:0}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.kpi-val{font-size:30px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ── 센서 ── */
.sensor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sensor-box{background:var(--surface);border-radius:var(--r-sm);padding:9px 11px;border:1px solid var(--border)}
.sensor-name{font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.sensor-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.sensor-unit{font-size:11px;color:var(--muted)}
.sensor-limit{font-size:9px;color:var(--muted2);margin-top:3px}
.gauge{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.gauge-fill{height:100%;border-radius:2px;transition:width .6s,background .4s}

/* ── 작업자 ── */
.worker-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.worker-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:border-color .15s}
.worker-row:hover{border-color:var(--border2)}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.worker-info{flex:1;min-width:0}
.worker-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.worker-loc{font-size:10px;color:var(--muted)}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}

/* ── 알람 ── */
.alert-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.alert-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-sm);font-size:12px}

/* ── 지도 ── */
.map-wrap{background:#0d1929;border-radius:8px;border:1px solid var(--border);overflow:hidden}

/* ── AI 패널 ── */
.ai-quick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.ai-qbtn{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--font)}
.ai-qbtn:hover{border-color:var(--accent);color:var(--accent)}
.ai-row{display:flex;gap:8px}
.ai-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:var(--font);transition:border-color .15s}
.ai-input:focus{border-color:var(--accent)}
.ai-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--font)}
.ai-btn:disabled{background:var(--border);cursor:not-allowed}
.ai-response{margin-top:10px;background:var(--surface);border-radius:8px;padding:12px 14px;border:1px solid var(--border);font-size:13px;line-height:1.7;color:var(--text);min-height:50px}

/* ── 색상 유틸 ── */
.c-success{color:var(--success)}.c-warn{color:var(--warn)}.c-danger{color:var(--danger)}.c-accent{color:var(--accent)}.c-muted{color:var(--muted)}
.b-success{background:rgba(0,230,118,.12);color:var(--success);border:1px solid rgba(0,230,118,.25)}
.b-warn{background:rgba(255,171,0,.12);color:var(--warn);border:1px solid rgba(255,171,0,.25)}
.b-danger{background:rgba(255,23,68,.12);color:var(--danger);border:1px solid rgba(255,23,68,.25)}

/* ── 애니메이션 ── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
@keyframes sos-ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.8);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.anim-blink{animation:blink .9s infinite}
.anim-fadein{animation:fadein .2s ease}
</style>
</head>
<body>
<div id="app">
  <!-- ── 상단 바 ── -->
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:16px;font-weight:700;color:var(--accent);letter-spacing:1px">SAFE<span style="color:var(--text)">GUARD</span></span>
      <span style="font-size:10px;color:var(--muted)">스마트 안전관리 시스템</span>
      <span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,107,53,.15);color:var(--accent2);border:1px solid rgba(255,107,53,.3);font-weight:600">DEMO</span>
    </div>
    <div style="font-size:13px;font-weight:500" id="site-name">
      <i class="ti ti-building" style="color:var(--muted);margin-right:4px"></i>왕송 맑은물처리장
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="sos-pill" style="display:none;font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,23,68,.15);color:var(--danger);border:1px solid rgba(255,23,68,.4);font-weight:700" class="anim-blink">
        <i class="ti ti-sos"></i> SOS 1건
      </span>
      <span style="font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(0,230,118,.1);color:var(--success);border:1px solid rgba(0,230,118,.25)">
        <i class="ti ti-circle-filled" style="font-size:8px;margin-right:3px"></i>시스템 정상
      </span>
      <span id="clock" style="font-size:12px;padding:3px 10px;border-radius:20px;background:rgba(0,212,255,.08);color:var(--accent);border:1px solid rgba(0,212,255,.2);font-variant-numeric:tabular-nums"></span>
    </div>
  </header>

  <div class="main">
    <!-- ── 사이드바 ── -->
    <nav class="sidebar">
      <div class="nav-section">관제</div>
      <button class="nav-item active" onclick="navigate('dashboard',this)"><i class="ti ti-layout-dashboard"></i>실시간 현황</button>
      <button class="nav-item" onclick="navigate('workers',this)"><i class="ti ti-users"></i>작업자 관리</button>
      <button class="nav-item" onclick="navigate('floormap',this)"><i class="ti ti-map-2"></i>현장 배치도</button>
      <div class="nav-section">모니터링</div>
      <button class="nav-item" onclick="navigate('sensor',this)"><i class="ti ti-cpu"></i>IoT 센서</button>
      <button class="nav-item" onclick="navigate('alerts',this)">
        <i class="ti ti-bell"></i>알람 이력
        <span id="alert-badge" style="margin-left:auto;font-size:9px;padding:1px 5px;border-radius:10px;background:var(--danger);color:#fff;font-weight:700" class="anim-blink">3</span>
      </button>
      <div class="nav-section">AI 분석</div>
      <button class="nav-item" onclick="navigate('ai',this)"><i class="ti ti-robot"></i>AI 안전 분석</button>
      <div class="nav-section">관리</div>
      <button class="nav-item" onclick="navigate('permit',this)"><i class="ti ti-file-check"></i>작업허가 관리</button>
      <button class="nav-item" onclick="navigate('settings',this)"><i class="ti ti-settings"></i>환경 설정</button>
      <div class="nav-footer">
        <div>SafeGuard Demo v1.0</div>
        <div style="margin-top:2px;color:var(--muted2)">GitHub Pages</div>
      </div>
    </nav>

    <!-- ── 콘텐츠 ── -->
    <main class="content" id="content"></main>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  설정 — Claude API 키를 여기에 입력하세요
//  키가 없으면 데모 모드로 동작합니다
// ══════════════════════════════════════════
const CLAUDE_API_KEY = ''   // 'sk-ant-...' 입력

// ══════════════════════════════════════════
//  가짜 데이터 (실 IoT 연동 전 사용)
// ══════════════════════════════════════════
const WORKERS = [
  {id:'W01',name:'김현수',dept:'밀폐공간팀',floor:'B1F',zone:'장비실', status:'sos',    bpm:135,o2:18.2,co:42,h2s:18.5,battery:72,sx:310,sy:128},
  {id:'W02',name:'박지훈',dept:'밀폐공간팀',floor:'B1F',zone:'구역 C', status:'warning',bpm:108,o2:20.5,co:20,h2s:9.2, battery:88,sx:300,sy:45},
  {id:'W03',name:'이민지',dept:'배관팀',    floor:'B1F',zone:'구역 B', status:'normal', bpm:76, o2:20.9,co:10,h2s:2.1, battery:91,sx:175,sy:45},
  {id:'W04',name:'최재원',dept:'배관팀',    floor:'B1F',zone:'구역 A', status:'normal', bpm:82, o2:21.0,co:8, h2s:1.8, battery:65,sx:60, sy:50},
  {id:'W05',name:'정수연',dept:'전기팀',    floor:'1F', zone:'제어실', status:'normal', bpm:71, o2:21.0,co:5, h2s:0.5, battery:95,sx:100,sy:128},
  {id:'W06',name:'한동훈',dept:'안전팀',    floor:'1F', zone:'통로',   status:'normal', bpm:78, o2:20.8,co:6, h2s:0.8, battery:80,sx:215,sy:60},
]

const ALERTS = [
  {level:'danger', icon:'ti-sos',        msg:'W01 김현수 SOS 발신 — B1F 장비실',             time:'방금'},
  {level:'danger', icon:'ti-flame',      msg:'H₂S 임계값 초과 18.5ppm (기준 10ppm)',          time:'2분 전'},
  {level:'danger', icon:'ti-gas-station',msg:'CO 농도 위험 42ppm (기준 30ppm) — B1F 장비실', time:'3분 전'},
  {level:'warning',icon:'ti-heart',      msg:'W02 박지훈 심박수 이상 108bpm',                 time:'5분 전'},
  {level:'warning',icon:'ti-battery-2',  msg:'W04 최재원 배터리 부족 (65%)',                  time:'11분 전'},
  {level:'info',   icon:'ti-check',      msg:'W03 이민지 밀폐공간 작업허가 완료',              time:'18분 전'},
  {level:'info',   icon:'ti-login',      msg:'W05 정수연 현장 입장 확인',                     time:'25분 전'},
]

const GAS_LIMITS = {
  o2: {warn:19.5,danger:18.0,unit:'%',  label:'산소 (O₂)',        max:22},
  co: {warn:25,  danger:50,  unit:'ppm',label:'일산화탄소 (CO)',   max:100},
  h2s:{warn:10,  danger:15,  unit:'ppm',label:'황화수소 (H₂S)',   max:30},
  bpm:{warn:100, danger:120, unit:'bpm',label:'심박수 (위험 구역)',max:200},
}

// ══════════════════════════════════════════
//  상태 관리
// ══════════════════════════════════════════
let workers = JSON.parse(JSON.stringify(WORKERS))
let currentView = 'dashboard'

// ══════════════════════════════════════════
//  실시간 시뮬레이션
// ══════════════════════════════════════════
function tick() {
  workers = workers.map(w => {
    if (w.status === 'sos') return {
      ...w,
      bpm: Math.min(180, Math.max(120, w.bpm + (Math.random()-.4)*4)),
      o2:  +Math.max(17.0,(w.o2+(Math.random()-.6)*.1)).toFixed(1),
      co:  +Math.min(80,(w.co+(Math.random()-.3)*2)).toFixed(1),
      h2s: +Math.min(25,(w.h2s+(Math.random()-.3)*.5)).toFixed(1),
    }
    if (w.status === 'warning') return {
      ...w, bpm: Math.max(95,Math.min(115,w.bpm+(Math.random()-.5)*4))
    }
    return {
      ...w,
      bpm: Math.max(60,Math.min(95,w.bpm+(Math.random()-.5)*3)),
      o2:  +Math.max(20.0,Math.min(21.5,(w.o2+(Math.random()-.5)*.05))).toFixed(2),
      co:  +Math.max(0,Math.min(20,(w.co+(Math.random()-.5)*1))).toFixed(1),
      h2s: +Math.max(0,Math.min(5,(w.h2s+(Math.random()-.5)*.2))).toFixed(1),
    }
  })
  if (currentView === 'dashboard') renderDashboard()
  if (currentView === 'workers')   renderWorkers()
}

// ══════════════════════════════════════════
//  유틸 함수
// ══════════════════════════════════════════
const sensorStatus = (k,v) => {
  const l = GAS_LIMITS[k]
  if (k==='o2') return v<=l.danger?'danger':v<=l.warn?'warning':'normal'
  return v>=l.danger?'danger':v>=l.warn?'warning':'normal'
}
const sensorColor = (k,v) => ({danger:'var(--danger)',warning:'var(--warn)',normal:'var(--success)'}[sensorStatus(k,v)])
const gaugePct = (k,v) => {
  if (k==='o2') return Math.min(100,Math.max(0,((v-16)/(22-16))*100))
  return Math.min(100,Math.max(0,(v/GAS_LIMITS[k].max)*100))
}
const workerColor = s => ({sos:'var(--danger)',warning:'var(--warn)',normal:'var(--success)'}[s])
const workerLabel = s => ({sos:'SOS!',warning:'주의',normal:'정상'}[s])
const workerBadge = s => ({sos:'b-danger anim-blink',warning:'b-warn',normal:'b-success'}[s])
const batteryIcon = p => p>75?'ti-battery-4':p>50?'ti-battery-3':p>25?'ti-battery-2':'ti-battery-1'

// ══════════════════════════════════════════
//  뷰 렌더러
// ══════════════════════════════════════════
function renderDashboard() {
  const kpi = {
    total:   workers.length,
    safe:    workers.filter(w=>w.status==='normal').length,
    warning: workers.filter(w=>w.status==='warning').length,
    sos:     workers.filter(w=>w.status==='sos').length,
  }
  const danger = workers.find(w=>w.status==='sos') || workers.find(w=>w.status==='warning')

  const el = document.getElementById('content')
  el.innerHTML = `
  <!-- KPI -->
  <div class="kpi-grid">
    ${[
      {label:'현장 인원',  val:kpi.total,   sub:'작업 승인 완료',  color:'var(--accent)', icon:'ti-users',         border:'rgba(0,212,255,.5)'},
      {label:'정상 작업',  val:kpi.safe,    sub:'생체·가스 정상',  color:'var(--success)',icon:'ti-shield-check',  border:'rgba(0,230,118,.5)'},
      {label:'주의 필요',  val:kpi.warning, sub:'심박/가스 이상',  color:'var(--warn)',   icon:'ti-alert-triangle',border:'rgba(255,171,0,.5)'},
      {label:'SOS 신호',   val:kpi.sos,     sub:kpi.sos>0?'즉시 대응 필요!':'이상 없음',color:'var(--danger)',icon:'ti-sos',border:'rgba(255,23,68,.5)'},
    ].map(c=>`
      <div class="kpi" style="border-top:3px solid ${c.border}">
        <div class="kpi-label"><i class="ti ${c.icon}" style="font-size:12px"></i>${c.label}</div>
        <div class="kpi-val" style="color:${c.color}">${c.val}</div>
        <div class="kpi-sub" style="${c.label==='SOS 신호'&&kpi.sos>0?'color:var(--danger)':''}">${c.sub}</div>
      </div>`).join('')}
  </div>

  <!-- 지도 + 센서 -->
  <div style="display:flex;gap:10px;flex-shrink:0">
    <div class="card" style="flex:1.4 1 0;min-width:0">
      <div class="card-title"><i class="ti ti-map-2"></i>현장 배치도 — B1F 밀폐공간
        <span style="margin-left:auto;font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">Beacon 위치 기반</span>
      </div>
      <div class="map-wrap">
        <svg viewBox="0 0 390 175" width="100%">
          <!-- 구역 -->
          ${[
            {x:20, y:20, w:100,h:65,label:'구역 A'},
            {x:140,y:20, w:110,h:65,label:'구역 B'},
            {x:270,y:20, w:100,h:65,label:'구역 C'},
            {x:20, y:105,w:240,h:55,label:'통로'},
            {x:278,y:105,w:92, h:55,label:'장비실'},
          ].map(z=>`
            <rect x="${z.x}" y="${z.y}" width="${z.w}" height="${z.h}" rx="4" fill="#0f2340" stroke="#1e3a5f" stroke-width="1"/>
            <text x="${z.x+z.w/2}" y="${z.y+z.h/2+4}" text-anchor="middle" fill="#2a4a6a" font-size="9" font-family="'Noto Sans KR',sans-serif">${z.label}</text>
          `).join('')}
          <!-- 가스센서 -->
          ${[[85,52],[205,87],[290,98]].map(([x,y])=>`
            <rect x="${x-8}" y="${y-8}" width="16" height="16" rx="3" fill="rgba(255,107,53,.75)"/>
            <text x="${x}" y="${y+4}" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">G</text>
          `).join('')}
          <!-- 작업자 -->
          ${workers.map(w=>{
            const col = workerColor(w.status)
            const isSos = w.status==='sos'
            return `
              ${isSos?`
                <circle cx="${w.sx}" cy="${w.sy}" r="9"  fill="none" stroke="${col}" stroke-width="1" opacity=".6" style="animation:sos-ring 1.4s ease-out infinite"/>
                <circle cx="${w.sx}" cy="${w.sy}" r="14" fill="none" stroke="${col}" stroke-width=".8" opacity=".3" style="animation:sos-ring 1.4s ease-out infinite .35s"/>
              `:''}
              <circle cx="${w.sx}" cy="${w.sy}" r="${isSos?9:7}" fill="${col}" opacity=".92" style="animation:pulse 2s ease-in-out infinite"/>
              <text x="${w.sx}" y="${w.sy+3.5}" text-anchor="middle" fill="${isSos?'#fff':'#000'}" font-size="${isSos?6:6.5}" font-weight="bold" font-family="'Noto Sans KR',sans-serif">${isSos?'SOS':w.id.replace('W0','W')}</text>
            `}).join('')}
          <!-- 범례 -->
          ${[['#00e676','정상'],['#ffab00','주의'],['#ff1744','SOS']].map(([c,l],i)=>`
            <circle cx="${15+i*58+4}" cy="168" r="4.5" fill="${c}"/>
            <text x="${15+i*58+12}" y="172" fill="#3a5a7a" font-size="8" font-family="'Noto Sans KR',sans-serif">${l}</text>
          `).join('')}
          <rect x="193" y="163" width="10" height="10" rx="2" fill="rgba(255,107,53,.75)"/>
          <text x="207" y="172" fill="#3a5a7a" font-size="8" font-family="'Noto Sans KR',sans-serif">가스센서</text>
        </svg>
      </div>
    </div>

    <!-- 센서 패널 -->
    <div class="card" style="flex:1 1 0;min-width:0">
      <div class="card-title"><i class="ti ti-activity"></i>IoT 센서 — 위험 구역
        <span style="margin-left:auto;font-size:10px;color:var(--danger);font-weight:400;text-transform:none;letter-spacing:0" class="anim-blink">● LIVE</span>
      </div>
      ${danger ? `<div class="sensor-grid">
        ${Object.entries({
          o2: danger.o2, co: danger.co, h2s: danger.h2s, bpm: Math.round(danger.bpm)
        }).map(([k,v])=>{
          const lim = GAS_LIMITS[k]
          return `
          <div class="sensor-box">
            <div class="sensor-name">${lim.label}</div>
            <div class="sensor-val" style="color:${sensorColor(k,v)}">${typeof v==='number'?(k==='bpm'?Math.round(v):v.toFixed(1)):'-'}<span class="sensor-unit"> ${lim.unit}</span></div>
            <div class="gauge"><div class="gauge-fill" style="width:${gaugePct(k,v)}%;background:${sensorColor(k,v)}"></div></div>
            <div class="sensor-limit">기준: ${k==='o2'?`≥ ${lim.danger}`:`≤ ${lim.warn}`} ${lim.unit}</div>
          </div>`
        }).join('')}
      </div>` : '<p style="color:var(--muted);font-size:13px">모든 구역 정상</p>'}
    </div>
  </div>

  <!-- 작업자 + 알람 -->
  <div style="display:flex;gap:10px;flex-shrink:0">
    <div class="card" style="flex:1 1 0;min-width:0">
      <div class="card-title"><i class="ti ti-users"></i>작업자 현황
        <span style="margin-left:auto;font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">${workers.length}명 입장 중</span>
      </div>
      <div class="worker-list">
        ${[...workers].sort((a,b)=>({sos:0,warning:1,normal:2}[a.status]-{sos:0,warning:1,normal:2}[b.status])).map(w=>`
          <div class="worker-row" style="border-left:3px solid ${w.status==='sos'?'var(--danger)':w.status==='warning'?'var(--warn)':'transparent'}">
            <div class="avatar" style="background:${w.status==='sos'?'rgba(255,23,68,.15)':w.status==='warning'?'rgba(255,171,0,.15)':'rgba(0,230,118,.15)'};color:${workerColor(w.status)};border:1px solid ${w.status==='sos'?'rgba(255,23,68,.3)':w.status==='warning'?'rgba(255,171,0,.3)':'rgba(0,230,118,.3)'}">
              ${w.status==='sos'?'SOS':w.name.slice(0,2)}
            </div>
            <div class="worker-info">
              <div class="worker-name">${w.name}</div>
              <div class="worker-loc"><i class="ti ti-map-pin" style="font-size:10px"></i> ${w.floor} ${w.zone}</div>
            </div>
            <div style="font-size:11px;color:${w.bpm>=120?'var(--danger)':w.bpm>=100?'var(--warn)':'var(--muted)'}">
              <i class="ti ti-heart" style="font-size:10px"></i> ${Math.round(w.bpm)}
            </div>
            <div style="font-size:13px;color:${w.battery<30?'var(--danger)':'var(--muted)'}">
              <i class="ti ${batteryIcon(w.battery)}"></i>
            </div>
            <span class="badge ${workerBadge(w.status)}">${workerLabel(w.status)}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card" style="flex:1 1 0;min-width:0">
      <div class="card-title"><i class="ti ti-bell-ringing"></i>최근 알람</div>
      <div class="alert-list">
        ${ALERTS.map(a=>`
          <div class="alert-item" style="background:${a.level==='danger'?'rgba(255,23,68,.07)':a.level==='warning'?'rgba(255,171,0,.07)':'rgba(0,212,255,.05)'};border:1px solid ${a.level==='danger'?'rgba(255,23,68,.2)':a.level==='warning'?'rgba(255,171,0,.2)':'rgba(0,212,255,.15)'}">
            <i class="ti ${a.icon}" style="font-size:15px;flex-shrink:0;color:${a.level==='danger'?'var(--danger)':a.level==='warning'?'var(--warn)':'var(--accent)'}"></i>
            <span style="flex:1">${a.msg}</span>
            <span style="font-size:10px;color:var(--muted);flex-shrink:0">${a.time}</span>
          </div>
        `).join('')}
      </div>
    </div>
  </div>

  <!-- AI 패널 -->
  ${renderAIPanel(danger)}
  `
}

function renderAIPanel(ctx) {
  const questions = [
    'H₂S 농도가 위험한가요? 즉시 조치사항은?',
    'SOS 발신 시 표준 대응 절차를 알려주세요',
    '밀폐공간 작업 허가 요건을 설명해주세요',
    '현재 상황에서 작업 중단 기준에 해당하나요?',
  ]
  return `
  <div class="card">
    <div class="card-title"><i class="ti ti-robot"></i>AI 안전 분석
      <span style="margin-left:4px;font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">— Claude API</span>
      <span style="margin-left:auto;font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(0,212,255,.08);color:${CLAUDE_API_KEY?'var(--success)':'var(--warn)'};font-weight:400;text-transform:none;letter-spacing:0">
        ${CLAUDE_API_KEY?'🟢 API 연결됨':'🟡 데모 모드'}
      </span>
    </div>
    <div class="ai-quick">
      ${questions.map(q=>`<button class="ai-qbtn" onclick="askAI('${q.replace(/'/g,"\\'")}',this.closest('.card').querySelector('.ai-response'),this.closest('.card').querySelector('.ai-input'),this.closest('.card').querySelector('.ai-btn'))">${q}</button>`).join('')}
    </div>
    <div class="ai-row">
      <input class="ai-input" placeholder="현장 상황에 대해 질문하세요..." onkeydown="if(event.key==='Enter')askAI(this.value,this.closest('.card').querySelector('.ai-response'),this,this.nextElementSibling)">
      <button class="ai-btn" onclick="const inp=this.previousElementSibling;askAI(inp.value,this.closest('.card').querySelector('.ai-response'),inp,this)">
        <i class="ti ti-send"></i> 분석
      </button>
    </div>
    <div class="ai-response" style="color:var(--muted)">현장 데이터를 바탕으로 AI가 위험도를 분석하고 대응 절차를 안내합니다.</div>
  </div>`
}

function renderWorkers() {
  document.getElementById('content').innerHTML = `
  <div class="card">
    <div class="card-title"><i class="ti ti-users"></i>작업자 전체 현황</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1px solid var(--border)">
        ${['ID','이름','부서','위치','상태','심박','O₂','CO','H₂S','배터리'].map(h=>`<th style="padding:6px 8px;text-align:left;color:var(--muted);font-weight:500">${h}</th>`).join('')}
      </tr></thead>

        ${workers.map(w=>`<tr style="border-bottom:1px solid var(--border)">

          <td style="padding:7px 8px;font-weight:500">${w.name}</td>
          <td style="padding:7px 8px;color:var(--muted)">${w.dept}</td>

          <td style="padding:7px 8px"><span class="badge ${workerBadge(w.status)}">${workerLabel(w.status)}</span></td>
          <td style="padding:7px 8px;color:${w.bpm>=120?'var(--danger)':w.bpm>=100?'var(--warn)':'var(--text)'}">${Math.round(w.bpm)}</td>
          <td style="padding:7px 8px;color:${w.o2<18?'var(--danger)':w.o2<19.5?'var(--warn)':'var(--success)'}">${w.o2.toFixed(1)}%</td>
          <td style="padding:7px 8px;color:${w.co>50?'var(--danger)':w.co>25?'var(--warn)':'var(--text)'}">${w.co.toFixed(1)}</td>
          <td style="padding:7px 8px;color:${w.h2s>15?'var(--danger)':w.h2s>10?'var(--warn)':'var(--text)'}">${w.h2s.toFixed(1)}</td>
          <td style="padding:7px 8px;color:${w.battery<30?'var(--danger)':'var(--muted)'}">${w.battery}%</td>

    </div>

  document.getElementById('content').innerHTML = `
  <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;text-align:center">
    <i class="ti ${icon}" style="font-size:48px;color:var(--muted2)"></i>
    <div style="font-size:18px;font-weight:600">${title}</div>
    <div style="font-size:13px;color:var(--muted);max-width:320px">${desc}</div>
    <div style="font-size:11px;color:var(--muted2);margin-top:8px;padding:6px 14px;border-radius:20px;border:1px dashed var(--border)">
      실 IoT/DB 연동 후 활성화 예정
    </div>
  </div>`
}

// ══════════════════════════════════════════
//  라우터
// ══════════════════════════════════════════
function navigate(view, btn) {
  currentView = view
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'))
  if (btn) btn.classList.add('active')
  switch(view) {
    case 'dashboard': renderDashboard(); break
    case 'workers':   renderWorkers();   break
    case 'floormap':  renderPlaceholder('현장 배치도','ti-map-2','전체 층별 배치도 및 Beacon 위치 추적. LoRa 게이트웨이 연동 후 실시간 위치가 표시됩니다.'); break
    case 'sensor':    renderPlaceholder('IoT 센서 상세','ti-cpu','전체 가스센서, 스마트밴드, 트래커 디바이스 상태. MQTT 연동 후 활성화됩니다.'); break
    case 'alerts':    renderPlaceholder('알람 이력','ti-bell','전체 알람 이력, 대응 기록, 통계 리포트. DB 연동 후 활성화됩니다.'); break
    case 'ai':        document.getElementById('content').innerHTML = renderAIPanel(workers.find(w=>w.status==='sos')); break
    case 'permit':    renderPlaceholder('작업허가 관리','ti-file-check','밀폐공간·고소작업 허가서 발행 및 전자 서명. 백엔드 연동 후 활성화됩니다.'); break
    default:          renderPlaceholder('준비 중','ti-settings','해당 기능은 준비 중입니다.'); break
  }
}

// ══════════════════════════════════════════
//  AI 분석 — Claude API 연동
// ══════════════════════════════════════════
async function askAI(question, responseEl, inputEl, btnEl) {
  const q = (question || inputEl?.value || '').trim()
  if (!q) return
  if (inputEl) inputEl.value = q

  responseEl.style.color = 'var(--muted)'
  responseEl.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> AI 분석 중...'
  if (btnEl) { btnEl.disabled = true }

  const sos = workers.find(w=>w.status==='sos')
  const systemPrompt = `당신은 산업 현장 안전관리 AI "SafeGuard AI"입니다.
중대재해처벌법, 산업안전보건법, KOSHA 기준을 숙지하고 있습니다.

현재 현장 실시간 데이터 (${new Date().toLocaleString('ko-KR')}):
- 현장 인원: ${workers.length}명 / SOS: ${workers.filter(w=>w.status==='sos').length}명 / 주의: ${workers.filter(w=>w.status==='warning').length}명
- H₂S: ${sos?.h2s?.toFixed(1)||'-'}ppm (기준 10ppm)
- CO: ${sos?.co?.toFixed(1)||'-'}ppm (기준 30ppm)
- O₂: ${sos?.o2?.toFixed(1)||'-'}% (기준 18% 이상)
- SOS 발신자: ${sos?`${sos.name} (${sos.floor} ${sos.zone}) 심박 ${Math.round(sos.bpm)}bpm`:'없음'}

한국어로 위험도(🔴/🟡/🟢)와 즉시 조치사항을 번호 목록으로 간결하게(6줄 이내) 답변하세요.`

  try {
    if (!CLAUDE_API_KEY) throw new Error('NO_KEY')

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':CLAUDE_API_KEY,'anthropic-version':'2023-06-01'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:500, stream:true,
        system: systemPrompt,
        messages:[{role:'user',content:q}]
      })
    })
    if (!res.ok) throw new Error((await res.json()).error?.message||'API 오류')

    responseEl.style.color = 'var(--text)'
    responseEl.innerHTML = ''
    const reader = res.body.getReader()
    const dec = new TextDecoder()
    let buf = ''
    while(true) {
      const {done,value} = await reader.read()
      if (done) break
      buf += dec.decode(value,{stream:true})
      const lines = buf.split('\n'); buf = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const data = line.slice(6)
        if (data==='[DONE]') continue
        try {
          const json = JSON.parse(data)
          if (json.delta?.text) responseEl.innerHTML += json.delta.text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--accent)">$1</strong>')
        } catch(_){}
      }
    }
  } catch(e) {
    // 데모 응답
    responseEl.style.color = 'var(--text)'
    const demo = `🔴 <strong style="color:var(--accent)">위험 상황 — 즉시 대응 필요</strong><br><br>
현재 B1F 장비실 H₂S ${sos?.h2s?.toFixed(1)||'18.5'}ppm, CO ${sos?.co?.toFixed(1)||'42'}ppm으로 허용기준 초과 상태입니다.<br><br>
<strong style="color:var(--accent)">즉시 조치 절차:</strong><br>
1. 해당 구역 작업 즉시 중단 명령<br>
2. 전 작업자 지상 대피 (B1F 이상)<br>
3. 강제 환기 장치 즉시 가동<br>
4. SOS 발신자 ${sos?.name||'김현수'} 구조팀 투입<br>
5. 119 신고 및 안전관리자 즉시 보고<br><br>
📋 <span style="color:var(--muted)">근거: 산업안전보건기준규칙 제619조 (밀폐공간 작업허가), KOSHA GUIDE C-6-2023</span>
${!CLAUDE_API_KEY?'<br><br><span style="color:var(--muted);font-size:11px">※ 실제 AI 분석을 사용하려면 index.html 상단 CLAUDE_API_KEY에 키를 입력하세요.</span>':''}`
    responseEl.innerHTML = demo
  } finally {
    if (btnEl) { btnEl.disabled = false }
  }
}

// ══════════════════════════════════════════
//  시계

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR',{hour12:false})
}

//  초기 실행

updateClock()
setInterval(updateClock, 1000)
setInterval(tick, 2500)
renderDashboard()
document.getElementById('sos-pill').style.display = 'flex'
</script>
